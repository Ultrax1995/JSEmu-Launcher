name: Build and Release JSEmu Launcher

on:
  # Sprawdza kompilację po każdej zmianie na main
  push:
    branches:
      - main

    # Tworzy Release po wysłaniu tagu, np. v3.5.1
    tags:
      - "v*"

  # Pozwala uruchomić sam build ręcznie
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64 Launcher
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Display .NET information
        run: dotnet --info

      - name: Publish launcher as single EXE
        shell: pwsh
        run: |
          dotnet publish "JSEmu Launcher/H1Emu Launcher.csproj" `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output "publish/JSEmu-Launcher-win-x64" `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

      - name: Verify compiled EXE
        shell: pwsh
        run: |
          $exe = "publish/JSEmu-Launcher-win-x64/JSEmu Launcher.exe"

          if (!(Test-Path $exe)) {
            Write-Host "Files found in publish directory:"
            Get-ChildItem "publish/JSEmu-Launcher-win-x64" -Recurse
            throw "JSEmu Launcher.exe was not created."
          }

          Get-Item $exe | Format-List FullName, Length

      - name: Create GitHub Release and upload EXE
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "publish/JSEmu-Launcher-win-x64/JSEmu Launcher.exe" `
            --verify-tag `
            --title "JSEmu Launcher ${{ github.ref_name }}" `
            --generate-notes